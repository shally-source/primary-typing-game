<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳附英文打字小勇士 - 成績上傳版</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-section">
                <div class="logo-icon">⌨️</div>
                <div class="logo-text">
                    <h1>澳附英文打字小勇士</h1>
                    <div class="student-badge">
                        <span class="student-badge-dot"></span>
                        <span id="studentInfoDisplay">未登錄</span>
                    </div>
                </div>
            </div>

            <div class="stats-section">
                <div class="stat-card stat-timer">
                    <span class="stat-icon">⏱️</span>
                    <div>
                        <div class="stat-value" id="timer">05:00</div>
                        <div class="stat-label">剩餘</div>
                    </div>
                </div>
                <div class="stat-card stat-progress">
                    <span class="stat-icon">📊</span>
                    <div>
                        <div class="stat-value" id="progressDisplay">0%</div>
                        <div class="stat-label">進度</div>
                    </div>
                </div>
                <div class="stat-card stat-speed">
                    <span class="stat-icon">🚀</span>
                    <div>
                        <div class="stat-value" id="speedDisplay">0.00</div>
                        <div class="stat-label">字/秒</div>
                    </div>
                </div>
                <div class="stat-card stat-accuracy">
                    <span class="stat-icon">🎯</span>
                    <div>
                        <div class="stat-value" id="accuracyDisplay">100%</div>
                        <div class="stat-label">準確</div>
                    </div>
                </div>
                <div class="stat-card stat-errors">
                    <span class="stat-icon">❌</span>
                    <div>
                        <div class="stat-value" id="errorDisplay">0</div>
                        <div class="stat-label">錯字</div>
                    </div>
                </div>
                <div class="stat-card stat-combo">
                    <span class="stat-icon">🔥</span>
                    <div>
                        <div class="stat-value" id="comboDisplay">0</div>
                        <div class="stat-label">連續</div>
                    </div>
                </div>
            </div>

            <div class="header-actions">
                <button id="pauseBtn" class="pause-btn hidden">
                    <span>⏸️</span>
                    <span>暫停</span>
                </button>
                <span id="loggedInInfo" class="logged-in-info hidden">
                    <span class="user-avatar" id="userAvatar">?</span>
                    <span id="loggedInName"></span>
                    <button id="logoutBtn" class="logout-btn">登出</button>
                </span>
                <button id="openArticleBtn" class="action-btn" style="background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); box-shadow: 0 2px 8px rgba(99, 102, 241, 0.35);">
                    <span>📚</span>
                    <span id="actionBtnText">選擇文章</span>
                </button>
                <button id="openLoginBtn" class="action-btn secondary hidden">
                    <span>🔐</span>
                    <span>登入</span>
                </button>
            </div>
        </header>

        <!-- Text Display -->
        <div id="textDisplay" class="text-area"></div>

        <!-- Keyboard -->
        <div class="keyboard-wrapper">
            <div id="keyboard" class="keyboard"></div>
        </div>
    </div>

    <!-- Hidden Input -->
    <input type="text" id="hiddenInput">

    <!-- Login Modal -->
    <div id="loginModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
                <h2>🔐 學生登入</h2>
            </div>
            <div class="modal-body">
                <div class="login-card">
                    <div class="login-title">
                        <span>🔑</span>
                        <span>輸入您的帳號與密碼</span>
                    </div>
                    <div id="loginError" class="login-error"></div>
                <div class="input-group-full">
                    <label>登入帳號</label>
                    <input type="text" id="loginAccount" class="login-input" placeholder="請輸入帳號" autocomplete="off">
                </div>
                <div class="input-group-full">
                    <label>密碼 (ID)</label>
                    <input type="password" id="loginPassword" class="login-input" placeholder="請輸入密碼">
                </div>
                    <button id="loginBtn" class="btn-login">登入 🔓</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Article Selection Modal -->
    <div id="articleModal" class="modal-overlay hidden">
        <div class="modal" style="max-width: 700px;">
            <div class="modal-header">
                <h2>選擇練習文章</h2>
                <button id="articleModalClose" class="modal-close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div id="articleGrid" class="article-grid"></div>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="importModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>📝 載入練習文章</h2>
                <button id="importModalClose" class="modal-close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div class="file-upload">
                    <label>📄 載入 .txt 文字檔</label>
                    <input type="file" id="fileLoader" accept=".txt">
                </div>

                <div class="divider">或直接貼上</div>

                <div class="input-group">
                    <label>粘貼文章內容</label>
                    <textarea id="articleInput" placeholder="在此粘貼練習文章..."></textarea>
                    <div class="char-count-display"><span id="charCount">0</span> 字</div>
                </div>

                <button id="confirmBtn" class="btn-primary">開始挑戰 🚀</button>
            </div>
        </div>
    </div>

    <!-- Game Countdown Overlay -->
    <div id="countdownOverlay" class="countdown-overlay hidden">
        <div class="countdown-number" id="countdownNumber">3</div>
        <div class="countdown-text">準備開始！</div>
    </div>

    <!-- Pause Overlay -->
    <div id="pauseOverlay" class="pause-overlay hidden">
        <div class="pause-content">
            <div class="pause-icon">⏸️</div>
            <h2>遊戲暫停</h2>
            <p>按空白鍵或點擊繼續</p>
            <button id="resumeBtn" class="btn-primary">繼續挑戰 ▶️</button>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="resultModal" class="modal-overlay result-modal hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="resultTitle">🏆 練習成果</h2>
            </div>
            <div class="modal-body">
                <div id="resultStats"></div>
                <div class="result-grade" id="resultGrade"></div>
                <div id="uploadStatus" class="upload-status uploading">正在同步成績至雲端...</div>
                <button id="restartBtn" class="btn-primary">再試一次 💪</button>
            </div>
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confettiCanvas" class="confetti-canvas"></canvas>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
